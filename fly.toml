# fly.toml app configuration file generated for your-shortr on 2026-05-13T00:43:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'your-shortr'
primary_region = 'lhr'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  BASE_URL = 'https://your-shortr.fly.dev'
  CREATE_RATE_LIMIT_MAX_REQUESTS = '10'
  CREATE_RATE_LIMIT_WINDOW_MS = '60000'
  HOST = '0.0.0.0'
  LOG_DIR = 'logs'
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'
  RATE_LIMIT_MAX_REQUESTS = '100'
  RATE_LIMIT_WINDOW_MS = '60000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/v1/health/ready'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
